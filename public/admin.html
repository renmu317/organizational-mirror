<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>照见 - Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-card: #1a1a1a;
      --text-primary: #e5e5e5;
      --text-secondary: #a3a3a3;
      --text-muted: #737373;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #262626;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .logo span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 1rem;
      margin-left: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
    }

    .back-link:hover {
      color: var(--accent-light);
    }

    /* 密码登录页 */
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-card h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .login-card p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    .login-card input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .login-card input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .login-card button {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-card button:hover {
      background: var(--accent-light);
    }

    .login-error {
      color: var(--danger);
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }

    /* 导航 */
    .nav-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .nav-tab {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-tab:hover {
      border-color: var(--text-muted);
    }

    .nav-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* 用户列表 */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .user-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .user-card:hover {
      border-color: var(--accent);
    }

    .user-card h3 {
      font-size: 1.125rem;
      margin-bottom: 0.25rem;
    }

    .user-card .company {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .user-stats {
      display: flex;
      gap: 1.5rem;
    }

    .user-stat {
      text-align: center;
    }

    .user-stat .value {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent-light);
    }

    .user-stat .label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* 会话列表 */
    .sessions-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .session-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .session-card:hover {
      border-color: var(--accent);
    }

    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .session-title {
      font-weight: 500;
    }

    .session-date {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .session-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .session-tag {
      background: var(--bg-secondary);
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
    }

    /* 会话详情 */
    .session-detail {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .session-detail h3 {
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .transcript {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
    }

    .transcript-message {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .transcript-message:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .transcript-role {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .transcript-role.user {
      color: var(--accent-light);
    }

    .transcript-content {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .discovery-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .discovery-section h4 {
      margin-bottom: 1rem;
      color: var(--warning);
    }

    .discovery-field {
      margin-bottom: 1rem;
    }

    .discovery-field label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .discovery-field p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .btn-back {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
    }

    .btn-back:hover {
      border-color: var(--text-muted);
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .breadcrumb a {
      color: var(--accent-light);
      text-decoration: none;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    /* 统计面板保留 */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }

    .metric-value {
      display: block;
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .metric-label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">照见 <span>Admin Dashboard</span></div>
      <div class="header-actions">
        <button class="nav-tab" id="logoutBtn" style="display: none;">Logout</button>
        <a href="/" class="back-link">Return to Chat</a>
      </div>
    </header>

    <div id="content">
      <!-- 动态内容 -->
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let adminPassword = sessionStorage.getItem('admin_password') || '';
    let currentView = 'login';
    let currentUserId = null;
    let currentSessionId = null;

    // 初始化
    async function init() {
      if (adminPassword) {
        const valid = await verifyPassword(adminPassword);
        if (valid) {
          showUsersView();
          document.getElementById('logoutBtn').style.display = 'block';
        } else {
          sessionStorage.removeItem('admin_password');
          adminPassword = '';
          showLoginView();
        }
      } else {
        showLoginView();
      }
    }

    // 验证密码
    async function verifyPassword(password) {
      try {
        const response = await fetch(`${API_BASE}/api/admin/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        return response.ok;
      } catch (error) {
        return false;
      }
    }

    // 登录页
    function showLoginView() {
      currentView = 'login';
      document.getElementById('content').innerHTML = `
        <div class="login-page">
          <div class="login-card">
            <h2>Admin Access</h2>
            <p>Enter password to continue</p>
            <input type="password" id="passwordInput" placeholder="Password" />
            <button onclick="handleLogin()">Login</button>
            <p class="login-error" id="loginError">Invalid password</p>
          </div>
        </div>
      `;
      document.getElementById('passwordInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
      document.getElementById('passwordInput').focus();
    }

    // 处理登录
    async function handleLogin() {
      const password = document.getElementById('passwordInput').value;
      const valid = await verifyPassword(password);

      if (valid) {
        adminPassword = password;
        sessionStorage.setItem('admin_password', password);
        document.getElementById('logoutBtn').style.display = 'block';
        showUsersView();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    // 登出
    document.getElementById('logoutBtn').addEventListener('click', () => {
      adminPassword = '';
      sessionStorage.removeItem('admin_password');
      document.getElementById('logoutBtn').style.display = 'none';
      showLoginView();
    });

    // 用户列表页
    async function showUsersView() {
      currentView = 'users';
      currentUserId = null;
      document.getElementById('content').innerHTML = `
        <nav class="nav-tabs">
          <button class="nav-tab active">Users</button>
          <button class="nav-tab" onclick="showStatsView()">Statistics</button>
        </nav>
        <div id="overallStats"><div class="loading">Loading overall statistics...</div></div>
        <div id="usersContainer"><div class="loading">Loading users...</div></div>
      `;

      // 加载总体统计
      try {
        const statsResponse = await fetch(`${API_BASE}/api/stats/depth`);
        const statsData = await statsResponse.json();
        renderOverallStats(statsData);
      } catch (error) {
        document.getElementById('overallStats').innerHTML = '';
      }

      try {
        const response = await fetch(`${API_BASE}/api/admin/users`, {
          headers: { 'X-Admin-Password': adminPassword }
        });
        const data = await response.json();

        if (data.users && data.users.length > 0) {
          renderUsers(data.users);
        } else {
          document.getElementById('usersContainer').innerHTML = `
            <div class="empty-state">No users yet</div>
          `;
        }
      } catch (error) {
        document.getElementById('usersContainer').innerHTML = `
          <div class="empty-state">Failed to load users: ${error.message}</div>
        `;
      }
    }

    // 渲染总体统计
    function renderOverallStats(data) {
      const { org, early, strategy, total_sessions, unclassified } = data;
      document.getElementById('overallStats').innerHTML = `
        <div class="metrics-grid" style="margin-bottom: 2rem;">
          <div class="metric-card">
            <span class="metric-value">${total_sessions || 0}</span>
            <span class="metric-label">Total Sessions</span>
          </div>
          <div class="metric-card">
            <span class="metric-value">${org?.total_count || org?.sample_size || 0}</span>
            <span class="metric-label">Org Path</span>
          </div>
          <div class="metric-card">
            <span class="metric-value">${early?.sample_size || 0}</span>
            <span class="metric-label">Early Path</span>
          </div>
          <div class="metric-card" style="border-color: #6366f1;">
            <span class="metric-value" style="color: #818cf8;">${strategy?.sample_size || 0}</span>
            <span class="metric-label">Strategy Path</span>
          </div>
          ${unclassified > 0 ? `
          <div class="metric-card" style="border-color: var(--warning);">
            <span class="metric-value" style="color: var(--warning);">${unclassified}</span>
            <span class="metric-label">Unclassified</span>
          </div>
          ` : ''}
          <div class="metric-card">
            <span class="metric-value">${org?.avg_depth || '--'}</span>
            <span class="metric-label">Avg Depth</span>
          </div>
          <div class="metric-card" style="border-color: var(--accent);">
            <span class="metric-value" style="color: var(--accent-light);">${org?.broke_assumption_rate || '--'}</span>
            <span class="metric-label">Broke Assumption ⭐</span>
          </div>
          <div class="metric-card">
            <span class="metric-value" style="color: var(--warning);">${org?.reached_rule_rate || '--'}</span>
            <span class="metric-label">Reached Rule</span>
          </div>
          <div class="metric-card" style="border-color: #6366f1;">
            <span class="metric-value" style="color: #818cf8;">${strategy?.with_rule_rate || '--'}</span>
            <span class="metric-label">Strategy Rule Rate</span>
          </div>
        </div>
      `;
    }

    // 渲染用户列表
    async function renderUsers(users) {
      // 先渲染基本卡片
      document.getElementById('usersContainer').innerHTML = `
        <div class="users-grid">
          ${users.map(user => {
            const lastActive = user.last_active ? new Date(user.last_active).toLocaleDateString('en-US', {
              month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            }) : 'Never';

            return `
              <div class="user-card" id="user-card-${user.id}" onclick="showUserSessions('${user.id}', '${escapeHtml(user.name)}')">
                <h3>${escapeHtml(user.name)}</h3>
                <p class="company">${user.company ? escapeHtml(user.company) : 'No company'}</p>
                <div class="user-stats" id="user-stats-${user.id}">
                  <div class="user-stat">
                    <div class="value">${user.session_count || 0}</div>
                    <div class="label">Sessions</div>
                  </div>
                  <div class="user-stat">
                    <div class="value" style="font-size: 0.875rem; color: var(--text-muted);">${lastActive}</div>
                    <div class="label">Last Active</div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;

      // 异步加载每个用户的统计
      for (const user of users) {
        try {
          const statsRes = await fetch(`${API_BASE}/api/admin/users/${user.id}/stats`, {
            headers: { 'X-Admin-Password': adminPassword }
          });
          const stats = await statsRes.json();

          const statsEl = document.getElementById(`user-stats-${user.id}`);
          if (statsEl && stats) {
            statsEl.innerHTML = `
              <div class="user-stat">
                <div class="value">${stats.total_sessions || 0}</div>
                <div class="label">Sessions</div>
              </div>
              <div class="user-stat">
                <div class="value">${stats.avg_depth || '--'}</div>
                <div class="label">Avg Depth</div>
              </div>
              <div class="user-stat">
                <div class="value">${stats.world_rule_count || 0}</div>
                <div class="label">Rules Found</div>
              </div>
            `;
          }
        } catch (e) {
          // 忽略错误，保持基本显示
        }
      }
    }

    // 用户会话列表
    async function showUserSessions(userId, userName) {
      currentView = 'sessions';
      currentUserId = userId;

      document.getElementById('content').innerHTML = `
        <div class="breadcrumb">
          <a href="#" onclick="showUsersView(); return false;">Users</a>
          <span>/</span>
          <span>${escapeHtml(userName)}</span>
        </div>
        <div id="sessionsContainer"><div class="loading">Loading sessions...</div></div>
      `;

      try {
        const response = await fetch(`${API_BASE}/api/admin/users/${userId}/sessions`, {
          headers: { 'X-Admin-Password': adminPassword }
        });
        const data = await response.json();

        if (data.sessions && data.sessions.length > 0) {
          renderSessions(data.sessions, userName);
        } else {
          document.getElementById('sessionsContainer').innerHTML = `
            <div class="empty-state">No sessions for this user</div>
          `;
        }
      } catch (error) {
        document.getElementById('sessionsContainer').innerHTML = `
          <div class="empty-state">Failed to load sessions: ${error.message}</div>
        `;
      }
    }

    // 渲染会话列表
    function renderSessions(sessions, userName) {
      document.getElementById('sessionsContainer').innerHTML = `
        <div class="sessions-list">
          ${sessions.map(session => {
            const date = new Date(session.created_at).toLocaleDateString('en-US', {
              month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });
            const title = session.title || session.surface_problem?.slice(0, 50) || 'Untitled';
            const path = session.path || 'unknown';
            const complete = session.session_complete ? 'Completed' : 'In Progress';

            return `
              <div class="session-card" onclick="showSessionDetail('${session.id}', '${escapeHtml(userName)}')">
                <div class="session-header">
                  <span class="session-title">${escapeHtml(title)}</span>
                  <span class="session-date">${date}</span>
                </div>
                <div class="session-meta">
                  <span class="session-tag">${path}</span>
                  <span class="session-tag">${complete}</span>
                  ${session.world_rule ? '<span class="session-tag" style="color: var(--success);">Has Rule</span>' : ''}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    // 会话详情
    async function showSessionDetail(sessionId, userName) {
      currentView = 'detail';
      currentSessionId = sessionId;

      document.getElementById('content').innerHTML = `
        <div class="breadcrumb">
          <a href="#" onclick="showUsersView(); return false;">Users</a>
          <span>/</span>
          <a href="#" onclick="showUserSessions('${currentUserId}', '${escapeHtml(userName)}'); return false;">${escapeHtml(userName)}</a>
          <span>/</span>
          <span>Session</span>
        </div>
        <div id="detailContainer"><div class="loading">Loading session...</div></div>
      `;

      try {
        const response = await fetch(`${API_BASE}/api/sessions/${sessionId}`);
        const data = await response.json();

        if (data.session) {
          renderSessionDetail(data.session, userName);
        } else {
          document.getElementById('detailContainer').innerHTML = `
            <div class="empty-state">Session not found</div>
          `;
        }
      } catch (error) {
        document.getElementById('detailContainer').innerHTML = `
          <div class="empty-state">Failed to load session: ${error.message}</div>
        `;
      }
    }

    // 渲染会话详情
    function renderSessionDetail(session, userName) {
      const history = session.history || [];
      const discovery = session.discovery_output;
      const depthMetrics = session.depth_metrics;

      // 深度指标显示
      let depthHtml = '';
      if (depthMetrics || session.layer_sequence?.length > 0) {
        const layerNames = { 1: 'Result', 2: 'Behavior', 3: 'Decision', 4: 'Assumption', 5: 'Environment', 6: 'Rule' };
        const maxDepth = depthMetrics?.max_depth || 0;
        const brokeAssumption = depthMetrics?.broke_assumption ? '✓' : '✗';
        const reachedRule = depthMetrics?.reached_rule ? '✓' : '✗';

        depthHtml = `
          <div class="metrics-grid" style="margin-bottom: 1.5rem;">
            <div class="metric-card" style="padding: 1rem;">
              <span class="metric-value" style="font-size: 1.5rem;">${maxDepth}</span>
              <span class="metric-label">Max Depth (${layerNames[maxDepth] || '--'})</span>
            </div>
            <div class="metric-card" style="padding: 1rem;">
              <span class="metric-value" style="font-size: 1.5rem; color: ${depthMetrics?.broke_assumption ? 'var(--success)' : 'var(--text-muted)'};">${brokeAssumption}</span>
              <span class="metric-label">Broke Assumption</span>
            </div>
            <div class="metric-card" style="padding: 1rem;">
              <span class="metric-value" style="font-size: 1.5rem; color: ${depthMetrics?.reached_rule ? 'var(--warning)' : 'var(--text-muted)'};">${reachedRule}</span>
              <span class="metric-label">Reached Rule</span>
            </div>
            <div class="metric-card" style="padding: 1rem;">
              <span class="metric-value" style="font-size: 1.5rem;">${depthMetrics?.turns || history.filter(m => m.role === 'user').length}</span>
              <span class="metric-label">Turns</span>
            </div>
          </div>
        `;
      }

      let transcriptHtml = history.map(msg => `
        <div class="transcript-message">
          <div class="transcript-role ${msg.role}">${msg.role === 'user' ? 'User' : 'AI'}</div>
          <div class="transcript-content">${escapeHtml(msg.content)}</div>
        </div>
      `).join('');

      let discoveryHtml = '';
      if (discovery) {
        discoveryHtml = `
          <div class="discovery-section">
            <h4>Discovery Card</h4>
            ${discovery.current_problem || discovery.current_challenge ? `
              <div class="discovery-field">
                <label>Problem / Challenge</label>
                <p>${escapeHtml(discovery.current_problem || discovery.current_challenge)}</p>
              </div>
            ` : ''}
            ${discovery.core_assumption ? `
              <div class="discovery-field">
                <label>Core Assumption</label>
                <p>${escapeHtml(discovery.core_assumption)}</p>
              </div>
            ` : ''}
            ${discovery.challenged_assumption ? `
              <div class="discovery-field">
                <label>Challenged Assumption</label>
                <p style="color: var(--accent-light);">${escapeHtml(discovery.challenged_assumption)}</p>
              </div>
            ` : ''}
            ${discovery.world_rule || session.world_rule ? `
              <div class="discovery-field">
                <label>World Rule</label>
                <p style="color: var(--warning); font-weight: 500;">${escapeHtml(discovery.world_rule || session.world_rule)}</p>
              </div>
            ` : ''}
            ${discovery.causal_chain && discovery.causal_chain.length > 0 ? `
              <div class="discovery-field">
                <label>Causal Chain</label>
                <p>${discovery.causal_chain.map(c => escapeHtml(c)).join(' → ')}</p>
              </div>
            ` : ''}
            ${discovery.success_definition ? `
              <div class="discovery-field">
                <label>Success Definition</label>
                <p>${escapeHtml(discovery.success_definition)}</p>
              </div>
            ` : ''}
            ${discovery.seven_day_experiment ? `
              <div class="discovery-field">
                <label>7-Day Experiment</label>
                <p>${escapeHtml(typeof discovery.seven_day_experiment === 'string' ? discovery.seven_day_experiment : discovery.seven_day_experiment.experiment || 'N/A')}</p>
              </div>
            ` : ''}
          </div>
        `;
      }

      document.getElementById('detailContainer').innerHTML = `
        <div class="session-detail">
          <h3>
            <span>Session Transcript</span>
            <span style="font-size: 0.75rem; color: var(--text-muted);">
              ${session.path || 'unknown'}${session.branch ? ' / ' + session.branch : ''} | ${history.length} messages
            </span>
          </h3>
          ${depthHtml}
          <div class="transcript">${transcriptHtml || '<div class="empty-state">No messages</div>'}</div>
          ${discoveryHtml}
        </div>
      `;
    }

    // 统计页
    async function showStatsView() {
      currentView = 'stats';
      document.getElementById('content').innerHTML = `
        <nav class="nav-tabs">
          <button class="nav-tab" onclick="showUsersView()">Users</button>
          <button class="nav-tab active">Statistics</button>
        </nav>
        <div id="statsContainer"><div class="loading">Loading statistics...</div></div>
      `;

      try {
        const response = await fetch(`${API_BASE}/api/stats/depth`);
        const data = await response.json();
        renderStats(data);
      } catch (error) {
        document.getElementById('statsContainer').innerHTML = `
          <div class="empty-state">Failed to load statistics: ${error.message}</div>
        `;
      }
    }

    // 渲染统计
    function renderStats(data) {
      const { org, early, strategy, total_sessions, unclassified } = data;
      const hasDepthData = org.sample_size > 0;
      const depthLabels = org.depth_distribution_labels || {
        1: 'Result', 2: 'Behavior', 3: 'Decision',
        4: 'Assumption', 5: 'Environment', 6: 'Rule'
      };

      // 计算柱状图最大值
      const dist = org.depth_distribution || {};
      const maxCount = Math.max(...Object.values(dist), 1);

      document.getElementById('statsContainer').innerHTML = `
        ${org.warning ? `<p style="color: var(--warning); font-size: 0.875rem; margin-bottom: 1rem;">⚠️ ${org.warning}</p>` : ''}

        <h3 style="margin-bottom: 1rem; color: var(--text-muted);">Overview</h3>
        <div class="metrics-grid">
          <div class="metric-card">
            <span class="metric-value">${total_sessions || 0}</span>
            <span class="metric-label">Total Sessions</span>
          </div>
          <div class="metric-card">
            <span class="metric-value">${org.total_count || org.sample_size || 0}</span>
            <span class="metric-label">Org Path</span>
          </div>
          <div class="metric-card">
            <span class="metric-value">${early.sample_size || 0}</span>
            <span class="metric-label">Early Path</span>
          </div>
          <div class="metric-card" style="border-color: #6366f1;">
            <span class="metric-value" style="color: #818cf8;">${strategy?.sample_size || 0}</span>
            <span class="metric-label">Strategy Path</span>
          </div>
          <div class="metric-card" style="${unclassified > 0 ? 'border-color: var(--warning);' : ''}">
            <span class="metric-value" style="${unclassified > 0 ? 'color: var(--warning);' : ''}">${unclassified || 0}</span>
            <span class="metric-label">Unclassified</span>
          </div>
        </div>

        <h3 style="margin: 2rem 0 1rem; color: var(--text-muted);">Org Path Depth Metrics</h3>
        <div class="metrics-grid">
          <div class="metric-card">
            <span class="metric-value">${org.avg_depth != null ? org.avg_depth : '--'}</span>
            <span class="metric-label">Avg Depth (${org.avg_depth_label || ''})</span>
          </div>
          <div class="metric-card" style="border-color: var(--accent);">
            <span class="metric-value" style="color: var(--accent-light);">${org.broke_assumption_rate || '--'}</span>
            <span class="metric-label">Broke Assumption ⭐</span>
          </div>
          <div class="metric-card">
            <span class="metric-value" style="color: var(--warning);">${org.reached_rule_rate || '--'}</span>
            <span class="metric-label">Reached Rule</span>
          </div>
        </div>

        <h3 style="margin: 2rem 0 1rem; color: var(--text-muted);">Depth Distribution</h3>
        <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem;">
          <div style="display: flex; justify-content: space-between; align-items: flex-end; height: 120px; gap: 0.5rem;">
            ${[1,2,3,4,5,6].map(d => {
              const count = dist[d] || 0;
              const height = maxCount > 0 ? (count / maxCount) * 100 : 0;
              const barColor = d >= 4 ? 'var(--accent)' : 'var(--text-muted)';
              return `
                <div style="flex: 1; text-align: center;">
                  <div style="height: ${height}px; background: ${barColor}; border-radius: 4px 4px 0 0; min-height: ${count > 0 ? 4 : 0}px; margin-bottom: 0.5rem;"></div>
                  <div style="font-size: 1.25rem; font-weight: 600; color: var(--text-primary);">${count}</div>
                  <div style="font-size: 0.625rem; color: var(--text-muted); line-height: 1.2;">${depthLabels[d] || 'L'+d}</div>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <h3 style="margin: 2rem 0 1rem; color: var(--text-muted);">Early Path Metrics</h3>
        <div class="metrics-grid">
          <div class="metric-card">
            <span class="metric-value">${early.sample_size || 0}</span>
            <span class="metric-label">Total Early Sessions</span>
          </div>
          <div class="metric-card">
            <span class="metric-value">${early.qualified_rate || '--'}</span>
            <span class="metric-label">Qualified Rate</span>
          </div>
          <div class="metric-card">
            <span class="metric-value">${early.qualified_count || 0}</span>
            <span class="metric-label">With Experiment</span>
          </div>
        </div>
      `;
    }

    // 工具函数
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 启动
    init();
  </script>
</body>
</html>
