<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title id="pageTitle">照见</title>
  <!-- Google Fonts: Noto Serif SC + Noto Sans SC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=19">
</head>
<body>
  <!-- 【v10】语言选择弹窗（首次进入时显示） -->
  <div class="lang-modal-overlay" id="langModalOverlay" style="display: none;">
    <div class="lang-modal">
      <h2 id="langSelectTitle">选择语言 / Choose Language</h2>
      <p id="langSelectHint">对话语言选定后，整场固定</p>
      <div class="lang-options">
        <button class="lang-option-btn" data-lang="zh">
          <span class="lang-flag">🇨🇳</span>
          <span class="lang-name">中文</span>
        </button>
        <button class="lang-option-btn" data-lang="en">
          <span class="lang-flag">🇺🇸</span>
          <span class="lang-name">English</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 【v9】开场姓名弹窗 -->
  <div class="name-modal-overlay" id="nameModalOverlay" style="display: none;">
    <div class="name-modal">
      <h2 id="welcomeTitle">欢迎</h2>
      <p id="welcomeHint">输入姓名开始对话</p>
      <input type="text" id="nameInput" placeholder="你的姓名" maxlength="50" />
      <input type="text" id="companyInput" placeholder="公司（选填）" maxlength="100" />
      <button id="nameSubmitBtn" class="btn-primary" disabled>开始对话</button>
    </div>
  </div>

  <!-- 【v9】主布局：侧边栏 + 内容区 -->
  <div class="app-layout" id="appLayout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-row">
          <img src="logo.png" alt="照见" class="sidebar-logo-img" />
          <h1 class="sidebar-logo" id="sidebarLogo">照见</h1>
          <!-- 【v10】语言切换按钮 -->
          <button class="lang-toggle-btn" id="langToggleBtn" title="Switch language">EN</button>
        </div>
        <button class="new-chat-btn" id="newChatBtn">+ 新对话</button>
      </div>
      <div class="sidebar-sessions" id="sidebarSessions">
        <!-- 会话列表动态生成 -->
      </div>
      <div class="sidebar-footer">
        <span class="user-name" id="sidebarUserName"></span>
      </div>
    </aside>

    <!-- 移动端汉堡菜单按钮 -->
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- 主内容区 -->
    <div class="container" id="appContainer">
    <!-- 欢迎区域（初始居中，有消息后隐藏） -->
    <div class="welcome-hero" id="welcomeHero">
      <div class="welcome-logo-row">
        <img src="logo.png" alt="照见" class="welcome-logo-img" />
        <h1 class="logo" id="welcomeLogo">照见</h1>
      </div>
      <p class="tagline" id="welcomeTagline">发现你还没看见的问题</p>
    </div>

    <!-- 对话区域 -->
    <main class="chat-container" id="chatContainer">
      <div class="chat-messages" id="chatMessages">
        <!-- 消息将动态插入 -->
      </div>

      <!-- 自然语言进度提示 -->
      <p class="session-hint" id="sessionHint"></p>
    </main>

    <!-- 选择题选项区域（L3难度时显示） -->
    <div class="choice-options" id="choiceOptions" style="display: none;">
      <div class="choice-grid" id="choiceGrid">
        <!-- 动态生成选项按钮 -->
      </div>
      <div class="choice-other" id="choiceOther" style="display: none;">
        <input type="text" id="otherInput" placeholder="请描述..." />
        <button id="otherSubmit" class="btn-primary" data-i18n="btn_submit">提交</button>
      </div>
    </div>

    <!-- 输入区域 -->
    <footer class="input-container" id="inputContainer">
      <!-- 【v9】图片预览区 -->
      <div class="image-preview-container" id="imagePreviewContainer" style="display: none;">
        <div class="image-preview" id="imagePreview">
          <img id="previewImg" src="" alt="Preview" />
          <button class="remove-image-btn" id="removeImageBtn" aria-label="Remove image">&times;</button>
        </div>
      </div>
      <div class="input-wrapper">
        <!-- 【v9】图片上传按钮 -->
        <button class="upload-btn" id="uploadBtn" aria-label="Upload image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display: none;" />
        <textarea
          id="userInput"
          placeholder="此刻，你公司/项目最大的挑战是什么？"
          data-i18n-placeholder="input_placeholder"
          rows="1"
          autofocus
        ></textarea>
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/>
          </svg>
        </button>
      </div>
      <div class="input-footer-row">
        <p class="input-hint" id="inputHint">按 Enter 发送，Shift+Enter 换行</p>
        <!-- 【v8】常驻结束按钮 -->
        <button id="endSessionBtn" class="end-session-btn" style="display: none;" data-i18n="btn_end">
          结束并生成卡片
        </button>
      </div>
    </footer>

    <!-- 发现卡（会话结束时显示）- 支持双路径 -->
    <div class="discovery-card" id="discoveryCard" style="display: none;">
      <button class="close-btn" id="closeCardBtn" aria-label="关闭">&times;</button>
      <h2 id="cardTitle">你的发现</h2>
      <div class="card-content" id="cardContent">
        <!-- 动态生成，根据路径不同显示不同内容 -->
      </div>
      <div class="card-actions">
        <button id="downloadCard" class="btn-secondary" data-i18n="btn_download">下载报告</button>
        <button id="restartBtn" class="btn-primary" data-i18n="btn_restart">开始新对话</button>
      </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
      <div class="loading-spinner"></div>
      <p id="loadingText">思考中...</p>
    </div>
  </div>
  </div> <!-- 关闭 app-layout -->

  <script src="i18n.js?v=2"></script>
  <script src="config.js?v=16"></script>
  <script src="app.js?v=18"></script>
</body>
</html>
