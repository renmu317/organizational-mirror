<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>照见</title>
  <!-- Google Fonts: Noto Serif SC + Noto Sans SC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=16">
</head>
<body>
  <div class="container" id="appContainer">
    <!-- 欢迎区域（初始居中，有消息后隐藏） -->
    <div class="welcome-hero" id="welcomeHero">
      <h1 class="logo">照见</h1>
      <p class="tagline">发现你还没看见的问题</p>
    </div>

    <!-- 对话区域 -->
    <main class="chat-container" id="chatContainer">
      <div class="chat-messages" id="chatMessages">
        <!-- 消息将动态插入 -->
      </div>

      <!-- 自然语言进度提示 -->
      <p class="session-hint" id="sessionHint"></p>
    </main>

    <!-- 选择题选项区域（L3难度时显示） -->
    <div class="choice-options" id="choiceOptions" style="display: none;">
      <div class="choice-grid" id="choiceGrid">
        <!-- 动态生成选项按钮 -->
      </div>
      <div class="choice-other" id="choiceOther" style="display: none;">
        <input type="text" id="otherInput" placeholder="请描述..." />
        <button id="otherSubmit" class="btn-primary">提交</button>
      </div>
    </div>

    <!-- 输入区域 -->
    <footer class="input-container" id="inputContainer">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="此刻，你公司/项目最大的挑战是什么？"
          rows="1"
          autofocus
        ></textarea>
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/>
          </svg>
        </button>
      </div>
      <div class="input-footer-row">
        <p class="input-hint">按 Enter 发送，Shift+Enter 换行</p>
        <!-- 【v8】常驻结束按钮 -->
        <button id="endSessionBtn" class="end-session-btn" style="display: none;">
          结束并生成卡片
        </button>
      </div>
    </footer>

    <!-- 发现卡（会话结束时显示）- 支持双路径 -->
    <div class="discovery-card" id="discoveryCard" style="display: none;">
      <button class="close-btn" id="closeCardBtn" aria-label="关闭">&times;</button>
      <h2 id="cardTitle">你的发现</h2>
      <div class="card-content" id="cardContent">
        <!-- 动态生成，根据路径不同显示不同内容 -->
      </div>
      <div class="card-actions">
        <button id="downloadCard" class="btn-secondary">下载报告</button>
        <button id="restartBtn" class="btn-primary">开始新对话</button>
      </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
      <div class="loading-spinner"></div>
      <p>思考中...</p>
    </div>
  </div>

  <script src="config.js?v=15"></script>
  <script src="app.js?v=15"></script>
</body>
</html>
